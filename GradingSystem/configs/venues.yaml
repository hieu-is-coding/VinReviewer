# Venue profiles for venue-aware rubric weight adjustment.
# Each venue defines emphasis multipliers for rubric dimensions and an acceptance threshold.
# The "emphasis" values are multipliers applied to default rubric weights (then renormalized).

venues:
  # --- Top ML/AI Conferences ---
  neurips:
    tier: top_conference
    full_name: "Conference on Neural Information Processing Systems"
    emphasis:
      thesis_scope: 1.2
      evidence_use: 1.0
      structure_cohesion: 0.8
      style_mechanics: 0.7
      critical_analysis: 1.5
      conventions: 0.6
    acceptance_threshold: 0.72
    novelty_weight: 0.35

